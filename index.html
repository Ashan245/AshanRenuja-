<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ සිහින දකින අහස | ඔබව සාදරයෙන් පිළිගනිමු ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a1a; color: #fff; line-height: 1.6; overflow-x: hidden; cursor: none; }
        
        /* Cursor */
        .cursor { width: 10px; height: 10px; background: #ff3366; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: all 0.1s ease; box-shadow: 0 0 20px #ff3366; }
        .cursor-follower { width: 30px; height: 30px; border: 2px solid rgba(255, 51, 102, 0.3); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: all 0.3s ease; }
        
        /* Background */
        .gradient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: linear-gradient(-45deg, #0a0a1a, #1a1a2e, #16213e, #0f3460); background-size: 400% 400%; animation: gradient 15s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .particle { position: absolute; width: 2px; height: 2px; background: rgba(255, 255, 255, 0.5); border-radius: 50%; animation: float 6s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0); opacity: 0.5; } 50% { transform: translateY(-30px) translateX(-10px); opacity: 0.3; } }

        /* Navigation */
        .navbar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px; padding: 12px 30px; z-index: 100; display: flex; gap: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .nav-link { color: #fff; text-decoration: none; font-weight: 500; transition: 0.3s; font-size: 0.9rem; }
        .nav-link:hover { color: #ff3366; }

        /* Main Styles */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; }
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-top: 100px; }
        .gradient-text { background: linear-gradient(135deg, #fff, #ff3366, #6a11cb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Social Icons */
        .social-icons { display: flex; gap: 20px; margin-top: 40px; }
        .social-icon { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; font-size: 1.2rem; transition: all 0.3s ease; }
        .social-icon:hover { background: #ff3366; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255, 51, 102, 0.4); border-color: #ff3366; }

        .cta-button { padding: 16px 40px; border-radius: 50px; background: linear-gradient(135deg, #ff3366, #6a11cb); color: #fff; text-decoration: none; font-weight: 600; transition: 0.3s; box-shadow: 0 10px 20px rgba(255, 51, 102, 0.3); margin-top: 30px; }
        .cta-button:hover { transform: scale(1.05); }

        .music-player { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 30px; margin: 80px 0; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div class="gradient-bg"></div>
    <div class="particles" id="particles"></div>

    <nav class="navbar">
        <a href="#home" class="nav-link">මුල් පිටුව</a>
        <a href="#music" class="nav-link">සංගීතය</a>
        <a href="#contact" class="nav-link">සම්බන්ධ වන්න</a>
    </nav>

    <div class="container">
        <section id="home" class="hero">
            <h1 style="font-size: clamp(2.5rem, 8vw, 5rem); font-family: 'Playfair Display'; line-height: 1.2;">
                <span class="gradient-text">සිහින</span> වලට<br>
                <span class="gradient-text">අලුත්</span> මානයක්
            </h1>
            <p style="margin: 20px 0; color: rgba(255,255,255,0.7); max-width: 600px;">මම නිර්මාණය කරන දේවල් සහ මගේ ලෝකය සමඟ සම්බන්ධ වන්න.</p>
            
            <a href="#music" class="cta-button">වැඩිදුර විස්තර <i class="fas fa-arrow-down"></i></a>

            <div class="social-icons" id="contact">
                <a href="#" class="social-icon" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-icon" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-icon" title="YouTube"><i class="fab fa-youtube"></i></a>
                <a href="#" class="social-icon" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                <a href="#" class="social-icon" title="TikTok"><i class="fab fa-tiktok"></i></a>
                <a href="mailto:ඔබේඊමේල්ලිපිනය" class="social-icon" title="Email"><i class="fas fa-envelope"></i></a>
            </div>
        </section>

        <section id="music" class="music-player">
            <h2 style="text-align: center; margin-bottom: 20px; font-family: 'Playfair Display';">සංගීතයට සවන් දෙන්න</h2>
            <div style="display: flex; align-items: center; gap: 20px; justify-content: center;">
                <div id="disc" style="width: 60px; height: 60px; background: linear-gradient(45deg, #ff3366, #6a11cb); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                    <i class="fas fa-compact-disc"></i>
                </div>
                <div>
                    <h3 style="font-size: 1.1rem;">Dreamy Lo-fi</h3>
                    <p style="color: rgba(255,255,255,0.5); font-size: 0.8rem;">පසුබිම් සංගීතය</p>
                </div>
                <button id="playBtn" style="margin-left: 20px; width: 50px; height: 50px; border-radius: 50%; border: none; background: #ff3366; color: #fff; cursor: pointer; transition: 0.3s;">
                    <i class="fas fa-play"></i>
                </button>
            </div>
        </section>

        <footer style="text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 0.8rem;">
            &copy; 2026 සිහින දකින අහස | නිර්මාණය: ඔබගේ නම
        </footer>
    </div>

    <script>
        // Cursor
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            setTimeout(() => {
                follower.style.left = e.clientX + 'px';
                follower.style.top = e.clientY + 'px';
            }, 80);
        });

        // Particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particlesContainer.appendChild(particle);
        }

        // Music Player Toggle
        const playBtn = document.getElementById('playBtn');
        const disc = document.getElementById('disc');
        let isPlaying = false;
        
        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if(isPlaying) {
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                disc.style.animation = 'spin 2s linear infinite';
                playBtn.style.background = '#6a11cb';
            } else {
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                disc.style.animation = 'none';
                playBtn.style.background = '#ff3366';
            }
        });

        // Smooth Scroll
        document.querySelectorAll('.nav-link, .cta-button').forEach(link => {
            link.addEventListener('click', (e) => {
                const href = link.getAttribute('href');
                if(href.startsWith('#')) {
                    e.preventDefault();
                    document.querySelector(href).scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
  </html>
